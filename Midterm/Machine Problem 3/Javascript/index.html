<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Problem 3 — Dataset Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

  <header>
    <div class="tag">&#x25B6; Machine Problem 3</div>
    <h1>Dataset <span>Analyzer</span></h1>
    <p class="subtitle">MP17 · MP18 · MP19</p>
  </header>

  <!-- File loader prompt -->
  <div class="file-prompt" id="file-prompt">
    <label for="csv-input">Enter dataset file path:</label>
    <div class="file-input-row">
      <input type="text" id="file-path-display" placeholder="No file selected..." readonly>
      <label class="browse-btn" for="csv-input">Browse</label>
      <input type="file" id="csv-input" accept=".csv" style="display:none">
    </div>
    <button id="load-btn" disabled>Load Dataset</button>
  </div>

  <!-- Banner (hidden until file is loaded) -->
  <div class="loaded-banner" id="loaded-banner" style="display:none"></div>

  <!-- Tabs (hidden until file is loaded) -->
  <div id="main-content" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('mp17')">MP17 · Longest Entry</button>
      <button class="tab" onclick="switchTab('mp18')">MP18 · Empty Rows</button>
      <button class="tab" onclick="switchTab('mp19')">MP19 · Summary Report</button>
    </div>

    <div class="panel active" id="panel-mp17"><div id="mp17-results"></div></div>
    <div class="panel"        id="panel-mp18"><div id="mp18-results"></div></div>
    <div class="panel"        id="panel-mp19"><div id="mp19-results"></div></div>
  </div>

</div>

<script src="main.js"></script>
<script src="mp17.js"></script>
<script src="mp18.js"></script>
<script src="mp19.js"></script>

</body>
</html>
